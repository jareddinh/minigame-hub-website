<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Minigame Hub | Contact</title>
        <link rel="stylesheet" href="css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <!-- Navigation Bar -->
            <nav class="navbar">
                <a href="index.html"><img src="images/logo.png" alt="MinigameHub Logo"></a>
                
                <!-- Navbar Links -->
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="games.html">Games</a>
                    <a href="about.html">About</a>
                    <a class="active" href="contact.html">Contact</a>
                </div>

                <!-- Search Bar -->
                <form class="search-container">
                    <label for="search-input" hidden>Search games</label>
                    <input type="text" id="search-input" placeholder="🔍︎ Search games...">
                    
                    <ul id="search-results"></ul>
                </form>
            </nav>
        </header>

        <main>
            <section>
                <h1 class="title">Contact</h1>

                <div class="contact-layout">
                    <!-- Email Section -->
                    <section class="contact-form">
                        <h2>Send us an email!</h2>
                        <form id="contact-form">
                            <!-- Email Input -->
                            <label for="email">Email<span class="required-colour">*</span></label>
                            <input type="text" id="email" placeholder="example@email.com">

                            <!-- Message Input -->
                            <label for="message">Message</label>
                            <textarea id="message" placeholder="Write your message here..." ></textarea>
                            
                            <!-- Send Button -->
                            <button type="submit">Send</button>
                        </form>

                        <p id="form-message"></p>
                    </section>                
                </div>
            </section>
        </main>

        <footer>
            <!-- Copyright -->
            <small id="copyright">Minigame Hub &copy; 2026. Built by Jared Dinh</small>
        </footer>
        <script src="js/script.js"></script>
    </body>
</html>
